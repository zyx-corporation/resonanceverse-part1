name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

      - name: Phase 3 decode benchmark + two_tier sweep (demo, CPU)
        run: |
          python experiments/decode_benchmark.py --demo --cpu \
            --max-new-tokens 4 --repeats 2 --out experiments/logs/ci_decode_bench.json
          python experiments/two_tier_sweep.py --demo --cpu \
            --max-new-tokens 4 --repeats 2 --out experiments/logs/ci_two_tier_sweep.json

      - name: Phase 3 M4 HBM probe + M5 squad span (demo, CPU)
        run: |
          python experiments/hbm_budget_probe.py --demo --cpu --seed 0 \
            --out experiments/logs/ci_hbm_budget.json
          python experiments/squad_span.py --demo --cpu --max-steps 10 --seed 0 \
            --out experiments/logs/ci_squad_span.json

      - name: Phase 3 P0 claim bundle (demo, CPU)
        run: |
          python experiments/phase3_claim_run.py --demo --cpu --seed 0 \
            --max-new-tokens 4 --repeats 2 --with-squad \
            --out-dir experiments/logs/ci_phase3_claim

      - name: Phase 3 GPT-2 layer skip benchmark (demo, CPU)
        run: |
          python experiments/gpt2_layer_skip_benchmark.py --demo --cpu \
            --seq-len 32 --repeats 3 --warmup 1 --skip-every 2 --seed 0 \
            --out experiments/logs/ci_gpt2_layer_skip.json

      - name: Instrumentation smoke + regression (StageTimer)
        run: |
          python experiments/instrument_smoke.py --cpu --seed 0 \
            --out experiments/logs/ci_instrument.json
          python experiments/regression_check.py --mode instrument \
            --baseline tests/baselines/instrument_cpu.json \
            --current experiments/logs/ci_instrument.json \
            --max-slowdown 100

      - name: Efficiency benchmark + regression check
        run: |
          python experiments/efficiency_benchmark.py \
            --cpu --seed 42 \
            --seq-lens 32 64 \
            --repeats 2 \
            --out experiments/logs/ci_efficiency.json
          python experiments/regression_check.py --mode efficiency \
            --baseline tests/baselines/efficiency_cpu_short.json \
            --current experiments/logs/ci_efficiency.json \
            --max-slowdown 80
